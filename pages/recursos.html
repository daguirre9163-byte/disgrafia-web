<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SIGEDIS | Biblioteca de Recursos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <main class="container py-4">
    <header class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
      <div>
        <h1 class="h3 mb-1"><i class="bi bi-collection-fill"></i> Biblioteca de Recursos</h1>
        <p class="text-muted mb-0">Material educativo sobre disgrafía con búsqueda y filtros en tiempo real.</p>
      </div>
      <a href="/dashboard.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Volver al dashboard</a>
    </header>

    <section class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-6 col-lg-5">
            <label for="buscarRecurso" class="form-label">Buscar</label>
            <input id="buscarRecurso" class="form-control" placeholder="Título, categoría o autor">
          </div>
          <div class="col-md-3 col-lg-3">
            <label for="filtroTipo" class="form-label">Tipo</label>
            <select id="filtroTipo" class="form-select">
              <option value="">Todos</option>
              <option value="PDF">PDF</option>
              <option value="Video">Video</option>
              <option value="Actividad">Actividad</option>
              <option value="Teoría">Teoría</option>
            </select>
          </div>
          <div class="col-md-3 col-lg-4 d-flex align-items-end">
            <span id="contadorRecursos" class="text-muted small"></span>
          </div>
        </div>
      </div>
    </section>

    <section>
      <div id="contenedorRecursos" class="row g-3"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/modules/recursos-module.js"></script>
</body>
</html>
