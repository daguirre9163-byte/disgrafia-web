<div class="fade-in">
    <div class="module-header d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div>
            <h2 class="module-title mb-1">Gestión de Cursos</h2>
            <p class="module-subtitle mb-0">Cree cursos y administre sus paralelos antes de registrar estudiantes.</p>
        </div>
        <button class="btn btn-primary" id="btnNuevoCurso" type="button">
            <i class="bi bi-plus-circle-fill"></i>
            Nuevo Curso
        </button>
    </div>

    <div class="row g-4 mt-2">
        <div class="col-xl-4 col-md-6">
            <div class="info-card">
                <div>
                    <small>Total Cursos</small>
                    <h3 id="totalCursos">0</h3>
                </div>
                <i class="bi bi-book-fill"></i>
            </div>
        </div>
        <div class="col-xl-4 col-md-6">
            <div class="info-card success">
                <div>
                    <small>Total Paralelos</small>
                    <h3 id="totalParalelos">0</h3>
                </div>
                <i class="bi bi-diagram-3-fill"></i>
            </div>
        </div>
        <div class="col-xl-4 col-md-6">
            <div class="info-card warning">
                <div>
                    <small>Total Estudiantes</small>
                    <h3 id="totalEstudiantes">0</h3>
                </div>
                <i class="bi bi-mortarboard-fill"></i>
            </div>
        </div>
    </div>

    <div class="search-container mt-4">
        <div class="input-group">
            <span class="input-group-text">
                <i class="bi bi-search"></i>
            </span>
            <input
                id="buscarCurso"
                type="text"
                class="form-control"
                placeholder="Buscar curso por nombre o nivel">
        </div>
    </div>

    <div id="contenedorCursos" class="row g-4 mt-3">
        <div class="col-12">
            <div class="empty-state">
                <i class="bi bi-book"></i>
                <h4>Aún no tienes cursos registrados</h4>
                <p>Crea tu primer curso y luego agrega los paralelos para habilitar el registro de estudiantes.</p>
                <button class="btn btn-primary" id="btnCrearPrimerCurso" type="button">
                    <i class="bi bi-plus-circle-fill"></i>
                    Crear mi primer curso
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalCurso" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Curso</h5>
                <button class="btn-close" data-bs-dismiss="modal" type="button"></button>
            </div>
            <div class="modal-body">
                <form id="formCurso">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="nombreCurso">Nombre</label>
                            <input id="nombreCurso" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="nivelCurso">Nivel</label>
                            <select id="nivelCurso" class="form-select" required>
                                <option value="">Seleccione...</option>
                                <option value="Inicial">Inicial</option>
                                <option value="EGB">EGB</option>
                                <option value="Bachillerato">Bachillerato</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="estadoCurso">Estado</label>
                            <select id="estadoCurso" class="form-select">
                                <option value="activo">Activo</option>
                                <option value="inactivo">Inactivo</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label" for="jornadaCurso">Jornada</label>
                            <select id="jornadaCurso" class="form-select">
                                <option value="">Seleccione...</option>
                                <option value="Matutina">Matutina</option>
                                <option value="Vespertina">Vespertina</option>
                                <option value="Nocturna">Nocturna</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="descripcionCurso">Descripción</label>
                        <textarea id="descripcionCurso" class="form-control" rows="3" placeholder="Observaciones generales del curso"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Cancelar</button>
                <button class="btn btn-primary" id="btnGuardarCurso" type="button">Guardar</button>
            </div>
        </div>
    </div>
</div>
