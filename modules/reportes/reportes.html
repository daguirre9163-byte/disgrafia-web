<div class="fade-in">
  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-3">
    <h2><i class="bi bi-bar-chart-line-fill"></i> Reportes Avanzados</h2>
    <div class="btn-group">
      <button class="btn btn-outline-danger" id="btnExportarPDF" type="button">PDF</button>
      <button class="btn btn-outline-success" id="btnExportarExcel" type="button">Excel</button>
      <button class="btn btn-outline-primary" id="btnExportarCSV" type="button">CSV</button>
    </div>
  </div>

  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Curso</label>
          <select class="form-select" id="reporteCursoSelect"></select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Paralelo</label>
          <select class="form-select" id="reporteParaleloSelect"></select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Sexo</label>
          <select class="form-select" id="reporteSexoSelect">
            <option value="">Todos</option>
            <option value="Femenino">Femenino</option>
            <option value="Masculino">Masculino</option>
            <option value="Otro">Otro</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Estado</label>
          <select class="form-select" id="reporteEstadoSelect">
            <option value="">Todos</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Edad</label>
          <select class="form-select" id="reporteEdadSelect">
            <option value="">Todas</option>
            <option value="Menor de 10">Menor de 10</option>
            <option value="10 a 14">10 a 14</option>
            <option value="15 o más">15 o más</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Diagnóstico</label>
          <select class="form-select" id="reporteDiagnosticoSelect">
            <option value="">Todos</option>
            <option value="Motriz">Motriz</option>
            <option value="Visuoespacial">Visuoespacial</option>
            <option value="Lingüística">Lingüística</option>
            <option value="Mixta">Mixta</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Fecha desde</label>
          <input type="date" class="form-control" id="reporteFechaDesde">
        </div>
        <div class="col-md-4">
          <label class="form-label">Fecha hasta</label>
          <input type="date" class="form-control" id="reporteFechaHasta">
        </div>
      </div>
    </div>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-md-3"><div class="card border-0 shadow-sm"><div class="card-body"><small>Promedio general</small><h4 id="kpiPromedioCurso">0</h4></div></div></div>
    <div class="col-md-3"><div class="card border-0 shadow-sm"><div class="card-body"><small>Total estudiantes</small><h4 id="kpiTop">0</h4></div></div></div>
    <div class="col-md-3"><div class="card border-0 shadow-sm"><div class="card-body"><small>Bajo desempeño</small><h4 id="kpiBajo">0</h4></div></div></div>
    <div class="col-md-3"><div class="card border-0 shadow-sm"><div class="card-body"><small>Evaluaciones del mes</small><h4 id="kpiEvaluacionesMes">0</h4></div></div></div>
  </div>

  <div class="row g-4">
    <div class="col-lg-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h5>Evolución mensual</h5>
          <canvas id="chartReporteEvolucion"></canvas>
        </div>
      </div>
    </div>
    <div class="col-lg-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h5>Distribución por diagnóstico</h5>
          <canvas id="chartReporteDisgrafia"></canvas>
        </div>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm mt-4">
    <div class="card-body table-scroll-x">
      <table class="table table-hover table-advanced" id="tablaReporteCurso">
        <thead class="table-light">
          <tr>
            <th>Estudiante</th>
            <th>Curso</th>
            <th>Paralelo</th>
            <th>Sexo</th>
            <th>Edad</th>
            <th>Diagnóstico</th>
            <th>Promedio</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="tablaReporteCursoBody">
          <tr><td colspan="8" class="text-center text-muted">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
