<div class="fade-in">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2><i class="bi bi-bar-chart-line-fill"></i> Reportes Avanzados</h2>
    <div class="btn-group">
      <button class="btn btn-outline-danger" id="btnExportarPDF">PDF</button>
      <button class="btn btn-outline-success" id="btnExportarExcel">Excel</button>
      <button class="btn btn-outline-primary" id="btnExportarCSV">CSV</button>
    </div>
  </div>

  <div class="row g-3 mb-3">
    <div class="col-md-6">
      <label class="form-label">Reporte individual</label>
      <select class="form-select" id="reporteEstudianteSelect"></select>
    </div>
    <div class="col-md-6">
      <label class="form-label">Reporte grupal</label>
      <select class="form-select" id="reporteCursoSelect"></select>
    </div>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-md-3"><div class="card border-0 shadow-sm"><div class="card-body"><small>Promedio curso</small><h4 id="kpiPromedioCurso">0</h4></div></div></div>
    <div class="col-md-3"><div class="card border-0 shadow-sm"><div class="card-body"><small>Top 3</small><h4 id="kpiTop">0</h4></div></div></div>
    <div class="col-md-3"><div class="card border-0 shadow-sm"><div class="card-body"><small>Bajo desempeño</small><h4 id="kpiBajo">0</h4></div></div></div>
    <div class="col-md-3"><div class="card border-0 shadow-sm"><div class="card-body"><small>Evaluaciones mes</small><h4 id="kpiEvaluacionesMes">0</h4></div></div></div>
  </div>

  <div class="row g-4">
    <div class="col-lg-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h5>Evolución mensual</h5>
          <canvas id="chartReporteEvolucion"></canvas>
        </div>
      </div>
    </div>
    <div class="col-lg-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body">
          <h5>Distribución por tipo de disgrafía</h5>
          <canvas id="chartReporteDisgrafia"></canvas>
        </div>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm mt-4">
    <div class="card-body table-scroll-x">
      <table class="table table-hover table-advanced" id="tablaReporteCurso">
        <thead class="table-light">
          <tr>
            <th>Estudiante</th>
            <th>Nivel</th>
            <th>Disgrafía</th>
            <th>Promedio</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="tablaReporteCursoBody">
          <tr><td colspan="5" class="text-center text-muted">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
