<div class="fade-in">
  <div class="module-header d-flex justify-content-between align-items-center flex-wrap gap-3">
    <div>
      <h2 class="module-title mb-1">Gestión de Paralelos</h2>
      <p class="module-subtitle mb-0">Cada paralelo pertenece a un curso y es obligatorio para registrar estudiantes.</p>
    </div>
    <button class="btn btn-primary" id="btnNuevoParalelo" type="button">
      <i class="bi bi-plus-circle-fill"></i>
      Nuevo Paralelo
    </button>
  </div>

  <div id="alertaSinCursosParalelos" class="alert alert-warning d-none mt-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
      <span>No existen cursos registrados. Debe crear un curso antes de gestionar paralelos.</span>
      <button class="btn btn-sm btn-outline-dark" data-module="cursos" type="button">Ir a Cursos</button>
    </div>
  </div>

  <div class="card border-0 shadow-sm mt-4">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-6">
          <input id="buscarParalelo" class="form-control" placeholder="Buscar paralelo por nombre">
        </div>
        <div class="col-md-6">
          <select id="filtroCursoParalelo" class="form-select">
            <option value="">Todos los cursos</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm mt-4">
    <div class="card-body table-scroll-x">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>Curso</th>
            <th>Paralelo</th>
            <th>Estado</th>
            <th>Estudiantes</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaParalelos">
          <tr><td colspan="5" class="text-center text-muted">Cargando paralelos...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="modalParalelo" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Paralelo</h5>
        <button class="btn-close" data-bs-dismiss="modal" type="button"></button>
      </div>
      <div class="modal-body">
        <form id="formParalelo">
          <div class="mb-3">
            <label class="form-label" for="cursoParalelo">Curso</label>
            <select id="cursoParalelo" class="form-select" required></select>
          </div>
          <div class="mb-3">
            <label class="form-label" for="nombreParalelo">Nombre del paralelo</label>
            <input id="nombreParalelo" class="form-control" maxlength="10" placeholder="A, B, C..." required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="estadoParalelo">Estado</label>
            <select id="estadoParalelo" class="form-select">
              <option value="activo">Activo</option>
              <option value="inactivo">Inactivo</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">Cancelar</button>
        <button class="btn btn-primary" id="btnGuardarParalelo" type="button">Guardar</button>
      </div>
    </div>
  </div>
</div>
