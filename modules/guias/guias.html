<div class="fade-in">
  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2><i class="bi bi-journal-bookmark-fill"></i> Guías Metodológicas</h2>
      <p class="text-muted mb-0">Procedimientos paso a paso para cada tipo de disgrafía</p>
    </div>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalGuia">
      <i class="bi bi-plus-circle"></i> Nueva Guía
    </button>
  </div>

  <!-- FILTROS -->
  <div class="card mb-4 border-0 shadow-sm">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Tipo de Disgrafía</label>
          <select id="filtroTipoGuia" class="form-select">
            <option value="">-- Todas las disgrafías --</option>
            <option value="Motriz">Motriz</option>
            <option value="Visuoespacial">Visuoespacial</option>
            <option value="Lingüística">Lingüística</option>
            <option value="Mixta">Mixta</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Nivel Educativo</label>
          <select id="filtroNivelGuia" class="form-select">
            <option value="">-- Todos los niveles --</option>
            <option value="Inicial">Educación Inicial</option>
            <option value="Primaria">Educación Primaria</option>
            <option value="Secundaria">Educación Secundaria</option>
            <option value="Superior">Educación Superior</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Búsqueda</label>
          <input type="text" id="buscarGuia" class="form-control" placeholder="Nombre o descripción...">
        </div>
      </div>
    </div>
  </div>

  <!-- LISTA DE GUÍAS -->
  <div class="row g-4" id="listaGuias">
    <div class="col-12 text-center text-muted">
      <p>Cargando guías metodológicas...</p>
    </div>
  </div>
</div>

<!-- MODAL CREAR/EDITAR GUÍA -->
<div class="modal fade" id="modalGuia" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Nueva Guía Metodológica</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="formGuia">
          <div class="form-group mb-3">
            <label class="form-label">Título *</label>
            <input type="text" id="tituloGuia" class="form-control" required>
          </div>

          <div class="form-group mb-3">
            <label class="form-label">Descripción General *</label>
            <textarea id="descripcionGuia" class="form-control" rows="3" required></textarea>
          </div>

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Tipo de Disgrafía *</label>
              <select id="tipoDisgrafiaGuia" class="form-select" required>
                <option value="">-- Seleccionar --</option>
                <option value="Motriz">Motriz</option>
                <option value="Visuoespacial">Visuoespacial</option>
                <option value="Lingüística">Lingüística</option>
                <option value="Mixta">Mixta</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Nivel Educativo *</label>
              <select id="nivelGuia" class="form-select" required>
                <option value="">-- Seleccionar --</option>
                <option value="Inicial">Educación Inicial</option>
                <option value="Primaria">Educación Primaria</option>
                <option value="Secundaria">Educación Secundaria</option>
                <option value="Superior">Educación Superior</option>
              </select>
            </div>
          </div>

          <!-- PASOS DINÁMICOS -->
          <div class="mt-4">
            <label class="form-label">Pasos Metodológicos *</label>
            <div id="pasosList" class="mb-3"></div>
            <button type="button" class="btn btn-sm btn-secondary" onclick="agregarPaso()">
              <i class="bi bi-plus"></i> Agregar Paso
            </button>
          </div>

          <!-- RECURSOS ASOCIADOS -->
          <div class="mt-4">
            <label class="form-label">Recursos Asociados</label>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="incluirRecursos" checked>
              <label class="form-check-label" for="incluirRecursos">
                Buscar y asociar recursos automáticamente
              </label>
            </div>
          </div>

          <div class="form-check mt-2">
            <input class="form-check-input" type="checkbox" id="publicoGuia" checked>
            <label class="form-check-label" for="publicoGuia">
              Disponible para todos (docentes y estudiantes)
            </label>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" onclick="guardarGuia()">Guardar Guía</button>
      </div>
    </div>
  </div>
</div>
