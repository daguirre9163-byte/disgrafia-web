<div class="fade-in">
  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2><i class="bi bi-collection-fill"></i> Recursos Pedagógicos</h2>
      <p class="text-muted mb-0">Biblioteca de documentos, videos y herramientas interactivas</p>
    </div>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalRecurso">
      <i class="bi bi-plus-circle"></i> Nuevo Recurso
    </button>
  </div>

  <!-- FILTROS -->
  <div class="card mb-4 border-0 shadow-sm">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label">Tipo de Recurso</label>
          <select id="filtroTipoRecurso" class="form-select">
            <option value="">-- Todos los tipos --</option>
            <option value="pdf">📄 PDF / Documento</option>
            <option value="video">🎥 Video</option>
            <option value="herramienta">🛠️ Herramienta Interactiva</option>
            <option value="ejercicio">✏️ Ejercicio Práctico</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Tipo de Disgrafía</label>
          <select id="filtroDisgrafiaRecurso" class="form-select">
            <option value="">-- Todas las disgrafías --</option>
            <option value="Motriz">Motriz</option>
            <option value="Visuoespacial">Visuoespacial</option>
            <option value="Lingüística">Lingüística</option>
            <option value="Mixta">Mixta</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Nivel Educativo</label>
          <select id="filtroNivelRecurso" class="form-select">
            <option value="">-- Todos los niveles --</option>
            <option value="Inicial">Educación Inicial</option>
            <option value="Primaria">Educación Primaria</option>
            <option value="Secundaria">Educación Secundaria</option>
            <option value="Superior">Educación Superior</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Búsqueda</label>
          <input type="text" id="buscarRecurso" class="form-control" placeholder="Nombre o descripción...">
        </div>
      </div>
    </div>
  </div>

  <!-- GALERÍA DE RECURSOS -->
  <div class="row g-4" id="galeriaRecursos">
    <div class="col-12 text-center text-muted">
      <p>Cargando recursos...</p>
    </div>
  </div>
</div>

<!-- MODAL CREAR/EDITAR RECURSO -->
<div class="modal fade" id="modalRecurso" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Nuevo Recurso</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="formRecurso">
          <div class="form-group mb-3">
            <label class="form-label">Nombre del Recurso *</label>
            <input type="text" id="nombreRecurso" class="form-control" required>
          </div>

          <div class="form-group mb-3">
            <label class="form-label">Descripción</label>
            <textarea id="descripcionRecurso" class="form-control" rows="3"></textarea>
          </div>

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Tipo de Recurso *</label>
              <select id="tipoRecursoForm" class="form-select" required onchange="actualizarCampos()">
                <option value="">-- Seleccionar --</option>
                <option value="pdf">PDF / Documento</option>
                <option value="video">Video</option>
                <option value="herramienta">Herramienta Interactiva</option>
                <option value="ejercicio">Ejercicio Práctico</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Tipo de Disgrafía *</label>
              <select id="disgrafiaRecursoForm" class="form-select" required>
                <option value="">-- Seleccionar --</option>
                <option value="Motriz">Motriz</option>
                <option value="Visuoespacial">Visuoespacial</option>
                <option value="Lingüística">Lingüística</option>
                <option value="Mixta">Mixta</option>
              </select>
            </div>
          </div>

          <div class="row g-3 mt-2">
            <div class="col-md-6">
              <label class="form-label">Nivel Educativo *</label>
              <select id="nivelRecursoForm" class="form-select" required>
                <option value="">-- Seleccionar --</option>
                <option value="Inicial">Educación Inicial</option>
                <option value="Primaria">Educación Primaria</option>
                <option value="Secundaria">Educación Secundaria</option>
                <option value="Superior">Educación Superior</option>
              </select>
            </div>
            <div class="col-md-6" id="campoURL">
              <label class="form-label">URL / Enlace *</label>
              <input type="url" id="urlRecurso" class="form-control" placeholder="https://...">
            </div>
          </div>

          <div class="row g-3 mt-2" id="campoArchivo" style="display:none;">
            <div class="col-12">
              <label class="form-label">Cargar Archivo</label>
              <input type="file" id="archivoRecurso" class="form-control">
              <small class="text-muted">PDF, Word, Excel (máx. 10 MB)</small>
            </div>
          </div>

          <div class="form-check mt-3">
            <input class="form-check-input" type="checkbox" id="publicoRecurso" checked>
            <label class="form-check-label" for="publicoRecurso">
              Disponible para todos (docentes y estudiantes)
            </label>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" onclick="guardarRecurso()">Guardar Recurso</button>
      </div>
    </div>
  </div>
</div>
