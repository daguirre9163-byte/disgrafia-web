<div class="fade-in">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-clipboard-check"></i> Evaluaciones</h2>
    <div class="badge bg-primary">Promedio: <span id="promedioEvaluaciones">0</span></div>
  </div>

  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body">
      <div class="wizard-steps" aria-label="Wizard de evaluación">
        <div class="wizard-step active" data-step="1">1. Estudiante</div>
        <div class="wizard-step" data-step="2">2. Evaluación</div>
        <div class="wizard-step" data-step="3">3. Confirmar</div>
      </div>

      <form id="formEvaluacion" class="row g-3">
        <div class="form-step active" data-step="1">
          <div class="col-md-6">
            <label class="form-label">Estudiante</label>
            <select id="estudianteEvaluacion" class="form-select" required></select>
            <div class="field-error" id="errorEstudiante"></div>
          </div>
          <div class="col-12 mt-3 text-end">
            <button class="btn btn-primary" type="button" id="btnPasoSiguiente">Siguiente</button>
          </div>
        </div>

        <div class="form-step" data-step="2">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Tipo</label>
              <select id="tipoEvaluacion" class="form-select">
                <option value="diagnostica">Diagnóstica</option>
                <option value="formativa">Formativa</option>
                <option value="sumativa">Sumativa</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Calificación</label>
              <input id="calificacionEvaluacion" type="number" min="0" max="10" step="0.1" class="form-control" required>
              <div class="field-error" id="errorCalificacion"></div>
            </div>
            <div class="col-md-4">
              <label class="form-label">Observaciones</label>
              <input id="observacionesEvaluacion" class="form-control" placeholder="Observaciones">
            </div>
          </div>
          <div class="col-12 mt-3 d-flex justify-content-between">
            <button class="btn btn-outline-secondary" type="button" id="btnPasoAnterior">Atrás</button>
            <button class="btn btn-primary" type="button" id="btnPasoConfirmar">Confirmar</button>
          </div>
        </div>

        <div class="form-step" data-step="3">
          <div id="resumenEvaluacion" class="alert alert-light border"></div>
          <div class="col-12 mt-3 d-flex justify-content-between">
            <button class="btn btn-outline-secondary" type="button" id="btnVolverEditar">Editar</button>
            <button class="btn btn-primary" type="submit" id="btnGuardarEvaluacion">Guardar evaluación</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body table-responsive">
      <table class="table table-hover table-advanced">
        <thead class="table-light">
          <tr>
            <th>Estudiante</th>
            <th>Tipo</th>
            <th>Calificación</th>
            <th>Feedback</th>
            <th>Observaciones</th>
            <th>Fecha</th>
          </tr>
        </thead>
        <tbody id="tablaEvaluaciones">
          <tr><td colspan="6" class="text-center text-muted">Cargando evaluaciones...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
