<div class="fade-in">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-clipboard-check"></i> Evaluaciones</h2>
        <div class="badge bg-primary">Promedio: <span id="promedioEvaluaciones">0</span></div>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form id="formEvaluacion" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Estudiante</label>
                    <select id="estudianteEvaluacion" class="form-select" required></select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Tipo</label>
                    <select id="tipoEvaluacion" class="form-select">
                        <option value="diagnostica">Diagnóstica</option>
                        <option value="formativa">Formativa</option>
                        <option value="sumativa">Sumativa</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">Calificación</label>
                    <input id="calificacionEvaluacion" type="number" min="0" max="10" step="0.1" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Observaciones</label>
                    <input id="observacionesEvaluacion" class="form-control" placeholder="Observaciones">
                </div>
                <div class="col-12 text-end">
                    <button class="btn btn-primary" type="submit">Guardar evaluación</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Estudiante</th>
                        <th>Tipo</th>
                        <th>Calificación</th>
                        <th>Observaciones</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody id="tablaEvaluaciones">
                    <tr><td colspan="5" class="text-center text-muted">Cargando evaluaciones...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
