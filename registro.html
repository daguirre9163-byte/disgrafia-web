<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registro | SIGEDIS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="css/login.css">

</head>

<body>

<div class="container-fluid">

    <div class="row vh-100">

        <div class="col-lg-6 d-none d-lg-flex login-left">

            <div class="overlay"></div>

            <div class="content">

                <h1>SIGEDIS</h1>

                <h3>Registro de Docentes</h3>

                <p>
                    Complete la información para crear su cuenta en la plataforma.
                </p>

            </div>

        </div>

        <div class="col-lg-6 login-right">

            <div class="login-card">

                <h2 class="text-center mb-4">

                    Crear Cuenta

                </h2>

                <form id="registroForm">

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label>Nombres</label>

                            <input
                                id="nombre"
                                class="form-control"
                                required>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Apellidos</label>

                            <input
                                id="apellido"
                                class="form-control"
                                required>

                        </div>

                    </div>

                    <div class="mb-3">

                        <label>Correo</label>

                        <input
                            id="correo"
                            type="email"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Institución</label>

                        <input
                            id="institucion"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Teléfono</label>

                        <input
                            id="telefono"
                            class="form-control"
                            pattern="0[0-9]{9}">

                    </div>

                    <div class="mb-3">

                        <label>Contraseña</label>

                        <input
                            id="password"
                            type="password"
                            class="form-control"
                            minlength="8"
                            required>

                    </div>

                    <div class="mb-4">

                        <label>Confirmar contraseña</label>

                        <input
                            id="confirmar"
                            type="password"
                            class="form-control"
                            minlength="8"
                            required>

                    </div>

                    <button
                        class="btn btn-primary w-100 py-3">

                        <i class="bi bi-person-plus-fill"></i>

                        Crear Cuenta

                    </button>

                </form>

                <hr>

                <div class="text-center">

                    ¿Ya tienes cuenta?

                    <a href="login.html">

                        Iniciar Sesión

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script type="module" src="js/registro.js"></script>

</body>

</html>
