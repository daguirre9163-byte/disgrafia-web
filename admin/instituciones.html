<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instituciones Admin | SIGEDIS</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar">
    <h2>SIGEDIS Admin</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="docentes.html">Docentes</a>
    <a class="active" href="instituciones.html">Instituciones</a>
    <a href="usuarios.html">Usuarios</a>
    <a href="auditoria.html">Auditoría</a>
  </aside>
  <main class="admin-main">
    <h1>Gestión de Instituciones</h1>
    <form class="toolbar" id="formInstitucion">
      <input name="nombre" placeholder="Nombre" required />
      <input name="ciudad" placeholder="Ciudad" required />
      <input name="pais" placeholder="País" required />
      <input name="email" type="email" placeholder="Email contacto" required />
      <select name="plan"><option>Básico</option><option>Pro</option><option>Enterprise</option></select>
      <button type="submit">Guardar</button>
    </form>
    <div class="table-wrap"><table><thead><tr><th>Nombre</th><th>Ciudad</th><th>País</th><th>Email</th><th>Plan</th><th>Acciones</th></tr></thead><tbody id="institucionesBody"></tbody></table></div>
  </main>
</div>
<script type="module" src="js/instituciones-admin.js"></script>
</body>
</html>
