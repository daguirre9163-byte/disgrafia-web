<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGEDIS | Sistema Integral para la Gestión de Estudiantes con Disgrafía</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS General del Sistema -->
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/notificaciones.css">
  <link rel="stylesheet" href="css/tablas.css">
  <link rel="stylesheet" href="css/formularios.css">
  <link rel="stylesheet" href="css/modules.css">

</head>

<body>

  <div id="app">

    <!-- SIDEBAR -->
    <aside id="sidebar"></aside>

    <!-- CONTENIDO PRINCIPAL -->
    <div id="main">

      <!-- Navbar -->
      <header id="navbar"></header>

      <!-- Área donde se cargarán los módulos -->
      <main id="content">

        <div class="d-flex justify-content-center align-items-center" style="height:80vh;">

          <div class="text-center">

            <div class="spinner-border text-primary mb-4" style="width:60px;height:60px;" role="status">

            </div>

            <div id="toastContainer" class="toast-container"></div>

            <h4>Cargando SIGEDIS...</h4>

            <p class="text-muted">

              Inicializando plataforma

            </p>

          </div>

        </div>

      </main>

    </div>

  </div>

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- Firebase -->
  <script type="module" src="firebase/firebase-config.js"></script>

  <!-- Aplicación -->
  <script type="module">
    import { protegerPagina } from "./firebase/guards.js";
    protegerPagina();
  </script>

  <script type="module" src="js/app.js"></script>

</body>

</html>
